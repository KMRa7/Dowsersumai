<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>敏感者判定テスト</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "Segoe UI", "Noto Sans JP", sans-serif;
      background: #f6f8f7;
      margin: 0;
      padding: 16px 10px 28px;
      color: #333;
    }

    .container {
      max-width: 560px;
      margin: 0 auto;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, #78c8a6, #5ba98d);
      color: #fff;
      padding: 22px 18px;
      text-align: center;
    }

    .header h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1.4;
      font-weight: 700;
    }

    .screen {
      display: none;
      padding: 18px 16px 22px;
    }

    .screen.active {
      display: block;
    }

    .intro {
      background: #f2faf6;
      border: 1px solid #d8eee3;
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 18px;
      line-height: 1.9;
      font-size: 14px;
      white-space: pre-line;
    }

    .section-label {
      display: block;
      margin-bottom: 12px;
      padding: 10px 12px;
      background: #5ba98d;
      color: #fff;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 700;
      line-height: 1.6;
    }

    .question-list {
      display: grid;
      gap: 14px;
      margin-bottom: 18px;
    }

    .question-item {
      background: #fafafa;
      border: 1px solid #e4e4e4;
      border-radius: 14px;
      padding: 14px;
    }

    .question-text {
      margin: 0 0 10px;
      font-size: 14px;
      line-height: 1.7;
      font-weight: 700;
    }

    .answer-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .answer-option {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      min-height: 42px;
      padding: 8px 10px;
      border: 1px solid #ddd;
      border-radius: 999px;
      background: #fff;
      font-size: 14px;
      cursor: pointer;
      transition: 0.2s ease;
      box-sizing: border-box;
    }

    .answer-option input {
      display: none;
    }

    .answer-option.selected {
      border-color: #5ba98d;
      background: #f2faf6;
      box-shadow: 0 0 0 1px rgba(91, 169, 141, 0.15);
      font-weight: 700;
    }

    .submit-button,
    .back-button {
      width: 100%;
      border: none;
      border-radius: 999px;
      color: #fff;
      padding: 15px 16px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
    }

    .submit-button {
      background: #df6b7b;
    }

    .back-button {
      background: #5ba98d;
      margin-top: 18px;
    }

    .loading-screen {
      min-height: 360px;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      box-sizing: border-box;
    }

    .loading-screen.active {
      display: flex;
    }

    .spinner {
      width: 44px;
      height: 44px;
      border: 4px solid #d9efe6;
      border-top: 4px solid #5ba98d;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 12px;
    }

    .loading-text {
      font-size: 14px;
      color: #5a7e6f;
      font-weight: 600;
    }

    .result-box,
    .answers-box {
      padding: 16px 14px;
      border-radius: 14px;
      background: #f7fbf9;
      border: 1px solid #dbece4;
      margin-top: 12px;
    }

    .result-title {
      margin: 0 0 10px;
      font-size: 22px;
      font-weight: 800;
      color: #356b57;
      line-height: 1.5;
    }

    .result-description {
      font-size: 14px;
      line-height: 1.9;
      color: #333;
      white-space: pre-line;
    }

    .selected-answer-list {
      margin: 0;
      padding-left: 18px;
      font-size: 13px;
      line-height: 1.9;
    }

    .selected-answer-list strong {
      color: #356b57;
    }

    .helper {
      margin-top: 8px;
      font-size: 12px;
      color: #666;
      text-align: center;
      line-height: 1.6;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    @media (max-width: 480px) {
      .header h1 {
        font-size: 22px;
      }

      .answer-group {
        grid-template-columns: 1fr;
      }

      .question-text,
      .answer-option,
      .result-description {
        font-size: 13px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>敏感者判定テスト</h1>
    </div>

    <div id="questionScreen" class="screen active">
      <div class="intro">下記の質問に直感で答えてください。
回答後、あなたの敏感度を確認できます。</div>

      <div class="section-label">【敏感者判定テスト】</div>

      <form id="sensitiveForm">
        <div class="question-list" id="questionList"></div>
        <button id="diagnoseButton" class="submit-button" type="button">あなたの敏感度を見てみる</button>
      </form>
    </div>

    <div id="loadingScreen" class="screen loading-screen">
      <div class="spinner"></div>
      <div class="loading-text">判定中...</div>
    </div>

    <div id="resultScreen" class="screen">
      <div class="answers-box">
        <p class="result-title">あなたの回答</p>
        <ol id="selectedAnswerList" class="selected-answer-list"></ol>
        
      </div>

      <div class="result-box">
        <p id="resultTitle" class="result-title"></p>
        <div id="resultDescription" class="result-description"></div>
      </div>

       <button id="sendButton" class="back-button" type="button">LINEに送る</button></button>
    </div>
  </div>

  <script>
    const questions = [
      { text: '黄色と青色はどちらが好き？', answers: [{ label: '黄色', isTarget: false }, { label: '青色', isTarget: true }] },
      { text: '鏡をみるのは好き？？', answers: [{ label: '好き', isTarget: false }, { label: '嫌い', isTarget: true }] },
      { text: '人と握手するとき、自分から手を出す？', answers: [{ label: '手を出す', isTarget: false }, { label: '手を出さない', isTarget: true }] },
      { text: '野菜料理と肉料理、どちらが好き？', answers: [{ label: '野菜料理', isTarget: true }, { label: '肉料理', isTarget: false }] },
      { text: '温かい料理と冷たい料理、どちらが好き？', answers: [{ label: '温かい料理', isTarget: false }, { label: '冷たい料理', isTarget: true }] },
      { text: '寝る時、右と左どちらを下にすると安眠できる？', answers: [{ label: '右', isTarget: false }, { label: '左', isTarget: true }] },
      { text: 'ピアノを弾いた時（または近くに行った時）、気分が悪くなったこと', answers: [{ label: 'ある', isTarget: true }, { label: 'ない', isTarget: false }] },
      { text: '時々片頭痛になる？', answers: [{ label: '起きる', isTarget: true }, { label: '起きない', isTarget: false }] },
      { text: '人が多いところと、少ないところ、どちらが好き？', answers: [{ label: '多いところ', isTarget: false }, { label: '少ないところ', isTarget: true }] },
      { text: 'じっとしているのと、行動的に動き回るのはどちらが好き？', answers: [{ label: 'じっとしている', isTarget: false }, { label: '行動的に回る', isTarget: true }] },
      { text: '太陽の光と月の光どちらが心地良く感じる？', answers: [{ label: '太陽の光', isTarget: true }, { label: '月の光', isTarget: false }] },
      { text: 'イライラしやすい？', answers: [{ label: 'しやすい', isTarget: false }, { label: 'しにくい', isTarget: true }] },
      { text: '甘いものと酸っぱいもの、どちらが好き？', answers: [{ label: '甘いもの', isTarget: false }, { label: '酸っぱいもの', isTarget: true }] },
      { text: '朝、布団や毛布を跳ね除けている事が多い？', answers: [{ label: '多い', isTarget: true }, { label: '少ない', isTarget: false }] },
      { text: '暗闇で色々な物が光って見える事がある？', answers: [{ label: 'ある', isTarget: true }, { label: 'ない', isTarget: false }] }
    ];

    const sensitiveResultText = `これは、特別な能力というよりも、
”感じ取る幅が広い状態”です。

人よりも多くの情報を受け取れる分、

・疲れやすい
・影響を受けやすい
・理由のない違和感を感じやすい

といった状態にもなりやすいのが特徴です。

ですがこれは、問題ではありません。

感覚は、整えるものです。

そしてその感覚は、

・空間
・人
・場の状態

とも深く関係しています。

もし、

・場所によって体調が変わる
・特定の空間で疲れやすい

と感じることがある場合は、

それは「あなたの問題」ではなく
空間との関係性かもしれません。`;

    const pendingText = `現在、判定対象の選択が6個以下の場合の表示内容は未設定です。
設定内容が決まり次第、ここに表示できます。`;

    const LIFF_ID = '2009684850-jcgBkTJo';
    let latestMessage = '';
    let liffReady = false;

    const questionList = document.getElementById('questionList');
    const diagnoseButton = document.getElementById('diagnoseButton');
    const sendButton = document.getElementById('sendButton');
    const questionScreen = document.getElementById('questionScreen');
    const loadingScreen = document.getElementById('loadingScreen');
    const resultScreen = document.getElementById('resultScreen');
    const selectedAnswerList = document.getElementById('selectedAnswerList');
    const resultTitle = document.getElementById('resultTitle');
    const resultDescription = document.getElementById('resultDescription');

    function showScreen(screen) {
      questionScreen.classList.remove('active');
      loadingScreen.classList.remove('active');
      resultScreen.classList.remove('active');
      screen.classList.add('active');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function renderQuestions() {
      questionList.innerHTML = questions.map((question, questionIndex) => {
        const number = questionIndex + 1;
        const answerHtml = question.answers.map((answer) => {
          return `
            <label class="answer-option">
              <input
                type="radio"
                name="q${questionIndex}"
                value="${answer.label}"
                data-is-target="${answer.isTarget ? 'true' : 'false'}"
              />
              <span>${answer.label}</span>
            </label>
          `;
        }).join('');

        return `
          <div class="question-item">
            <p class="question-text">${number}. Q. ${question.text}</p>
            <div class="answer-group">${answerHtml}</div>
          </div>
        `;
      }).join('');
    }

    function syncSelectedStyles() {
      document.querySelectorAll('.answer-option').forEach((label) => {
        const input = label.querySelector('input');
        label.classList.toggle('selected', input.checked);
      });
    }

    function getSelectedAnswers() {
      return questions.map((question, index) => {
        const selected = document.querySelector(`input[name="q${index}"]:checked`);
        if (!selected) return null;

        return {
          questionNumber: index + 1,
          questionText: question.text,
          answer: selected.value,
          isTarget: selected.getAttribute('data-is-target') === 'true'
        };
      }).filter(Boolean);
    }

    function renderResult(selectedAnswers) {
      const targetCount = selectedAnswers.filter((item) => item.isTarget).length;

      selectedAnswerList.innerHTML = selectedAnswers.map((item) => {
        return `<li>Q. ${item.questionText}<br>A. ${item.answer}</li>`;
      }).join('');

      if (targetCount >= 7) {
        resultTitle.textContent = '「敏感者」の傾向があります。';
        resultDescription.textContent = sensitiveResultText;
      } else {
        resultTitle.textContent = '判定結果は準備中です。';
        resultDescription.textContent = pendingText;
      }

      const selectedText = selectedAnswers
        .map((item) => `・Q. ${item.questionText}
　A. ${item.answer}`)
        .join('
');

      latestMessage = `≪敏感者判定テスト≫

【あなたの回答】
${selectedText}

【判定結果】
${resultTitle.textContent}

${resultDescription.textContent}`;
    }

    async function initLiff() {
      if (typeof liff === 'undefined') return;

      try {
        await liff.init({ liffId: LIFF_ID });
        liffReady = true;
      } catch (error) {
        console.error('LIFF初期化失敗', error);
      }
    }

    async function sendToLine() {
      if (!latestMessage) {
        alert('先に判定してください。');
        return;
      }

      if (!liffReady) {
        alert('LIFFの初期化が完了していません。');
        return;
      }

      try {
        if (!liff.isLoggedIn()) {
          liff.login();
          return;
        }

        if (!liff.isInClient()) {
          alert('LINEアプリ内で開くと送信できます。');
          return;
        }

        await liff.sendMessages([{ type: 'text', text: latestMessage }]);
        alert('LINEに送信しました');
        liff.closeWindow();
      } catch (error) {
        console.error('送信失敗', error);
        alert('LINE送信に失敗しました。LIFF設定をご確認ください。');
      }
    }

    function startDiagnosis() {
      const selectedAnswers = getSelectedAnswers();

      if (selectedAnswers.length !== questions.length) {
        alert('すべての質問に回答してください。');
        return;
      }

      showScreen(loadingScreen);

      window.setTimeout(() => {
        renderResult(selectedAnswers);
        showScreen(resultScreen);
      }, 900);
    }

    function resetDiagnosis() {
      document.getElementById('sensitiveForm').reset();
      syncSelectedStyles();
      selectedAnswerList.innerHTML = '';
      
      resultTitle.textContent = '';
      resultDescription.textContent = '';
      showScreen(questionScreen);
    }

    renderQuestions();

    document.addEventListener('change', (event) => {
      if (event.target.matches('input[type="radio"]')) {
        syncSelectedStyles();
      }
    });

    diagnoseButton.addEventListener('click', startDiagnosis);
    sendButton.addEventListener('click', sendToLine);
    initLiff();
    
  </script>
  <script src="https://static.line-scdn.net/liff/edge/2.1/sdk.js"></script>
</body>
</html>
