<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>住まいの感覚チェック</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "Segoe UI", "Noto Sans JP", sans-serif;
      background: #f6f8f7;
      margin: 0;
      padding: 16px 10px 28px;
      color: #333;
    }

    .container {
      max-width: 560px;
      margin: 0 auto;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, #78c8a6, #5ba98d);
      color: #fff;
      padding: 22px 18px;
      text-align: center;
    }

    .header h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1.4;
      font-weight: 700;
    }

    .screen {
      display: none;
      padding: 18px 16px 22px;
    }

    .screen.active {
      display: block;
    }

    .intro {
      background: #f2faf6;
      border: 1px solid #d8eee3;
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 18px;
      line-height: 1.9;
      font-size: 14px;
      white-space: pre-line;
    }

    .section-label {
      display: block;
      margin-bottom: 12px;
      padding: 10px 12px;
      background: #5ba98d;
      color: #fff;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 700;
      line-height: 1.6;
    }

    .check-list {
      display: grid;
      gap: 10px;
      margin-bottom: 18px;
    }

    .check-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      background: #fafafa;
      border: 1px solid #e4e4e4;
      border-radius: 14px;
      padding: 13px 14px;
      cursor: pointer;
      transition: 0.2s ease;
      font-size: 14px;
      line-height: 1.7;
    }

    .check-item input {
      width: 18px;
      height: 18px;
      margin-top: 3px;
      accent-color: #5ba98d;
      flex: 0 0 auto;
    }

    .check-item.selected {
      border-color: #5ba98d;
      background: #f2faf6;
      box-shadow: 0 0 0 1px rgba(91, 169, 141, 0.15);
      font-weight: 700;
    }

    .submit-button,
    .send-button {
      width: 100%;
      border: none;
      border-radius: 999px;
      color: #fff;
      padding: 15px 16px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
    }

    .submit-button {
      background: #df6b7b;
    }

    .send-button {
      background: #5ba98d;
      margin-top: 18px;
    }

    .loading-screen {
      min-height: 360px;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      box-sizing: border-box;
    }

    .loading-screen.active {
      display: flex;
    }

    .spinner {
      width: 44px;
      height: 44px;
      border: 4px solid #d9efe6;
      border-top: 4px solid #5ba98d;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 12px;
    }

    .loading-text {
      font-size: 14px;
      color: #5a7e6f;
      font-weight: 600;
    }

    .answers-box,
    .result-box {
      padding: 16px 14px;
      border-radius: 14px;
      background: #f7fbf9;
      border: 1px solid #dbece4;
      margin-top: 12px;
    }

    .result-title {
      margin: 0 0 10px;
      font-size: 20px;
      font-weight: 800;
      color: #356b57;
      line-height: 1.5;
    }

    .result-description {
      font-size: 14px;
      line-height: 1.9;
      color: #333;
      white-space: pre-line;
    }

    .selected-answer-list {
      margin: 0;
      padding-left: 20px;
      font-size: 13px;
      line-height: 1.9;
    }

    .empty-text {
      margin: 0;
      font-size: 13px;
      color: #666;
      line-height: 1.7;
    }

    .count-text {
      margin: 12px 0 0;
      text-align: center;
      font-size: 13px;
      color: #666;
      line-height: 1.7;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    @media (max-width: 480px) {
      .header h1 {
        font-size: 22px;
      }

      .check-item,
      .result-description {
        font-size: 13px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>住まいの感覚チェック</h1>
    </div>

    <div id="questionScreen" class="screen active">
      <div class="intro">今いる場所、
「なんとなく気になること」はありませんか？

当てはまるものにチェックしてみてください</div>

      <div class="section-label">🌿【住まいの感覚チェック】</div>

      <form id="senseForm">
        <div id="checkList" class="check-list"></div>
        <button id="checkButton" class="submit-button" type="button">感覚チェックをする</button>
      </form>
    </div>

    <div id="loadingScreen" class="screen loading-screen">
      <div class="spinner"></div>
      <div class="loading-text">チェック中...</div>
    </div>

    <div id="resultScreen" class="screen">
      <div class="answers-box">
        <p class="result-title">あなたの回答</p>
        <ol id="selectedAnswerList" class="selected-answer-list"></ol>
        <p id="emptySelectedText" class="empty-text">チェックされた項目はありません。</p>
        <p id="countText" class="count-text"></p>
      </div>

      <div class="result-box">
        <p id="resultTitle" class="result-title"></p>
        <div id="resultDescription" class="result-description"></div>
      </div>

      <button id="sendButton" class="send-button" type="button">LINEに送る</button>
    </div>
  </div>

  <script src="https://static.line-scdn.net/liff/edge/2.1/sdk.js"></script>
  <script>
    const checkItems = [
      '家のまわりで、同じ場所に虫の巣をよく見かける',
      'なぜか猫がよく集まる場所がある',
      '夜中（1時〜3時）にふと目が覚めることがある',
      'しっかり寝たはずなのに、疲れが残ることがある',
      '寝つきが悪いと感じることがある',
      '引っ越しや部屋を変えてから、体調の変化を感じたことがある',
      '植物が育ちにくい、または元気がなくなりやすい',
      '食べ物が傷みやすいと感じることがある',
      '空気が重い・どんより感じる場所がある'
    ];

    const resultTextForFiveOrMore = `あなたは少しだけ
住まいの影響を受けている可能性があります

気になる方は、
一度しっかり整えてみるのもおすすめです

・疲れやすい
・気分がスッキリしない
・イライラしやすい

といった状態になりやすいのが特徴です。

ですがこれは、
問題ではありません。

住まいは、
整えられるものです。

また、

・場所によって体調が変わる
・特定の空間で疲れやすい

と感じることがある場合は、

それは「あなたの問題」ではなく
空間との関係性かもしれません。

気になる方は、
一度しっかり整えてみるのもおすすめです。`;

    const pendingText = `チェックが4つ以下の場合の表示内容は、現在まだ未設定です。`;

    const questionScreen = document.getElementById('questionScreen');
    const loadingScreen = document.getElementById('loadingScreen');
    const resultScreen = document.getElementById('resultScreen');
    const checkList = document.getElementById('checkList');
    const checkButton = document.getElementById('checkButton');
    const sendButton = document.getElementById('sendButton');
    const selectedAnswerList = document.getElementById('selectedAnswerList');
    const emptySelectedText = document.getElementById('emptySelectedText');
    const countText = document.getElementById('countText');
    const resultTitle = document.getElementById('resultTitle');
    const resultDescription = document.getElementById('resultDescription');

    const LIFF_ID = '2009756046-LGSv8mSu';
    let latestMessage = '';
    let liffReady = false;

    function showScreen(screen) {
      questionScreen.classList.remove('active');
      loadingScreen.classList.remove('active');
      resultScreen.classList.remove('active');
      screen.classList.add('active');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function renderCheckItems() {
      checkList.innerHTML = checkItems.map((item) => {
        return `
          <label class="check-item">
            <input type="checkbox" name="senseCheck" value="${item}" />
            <span>${item}</span>
          </label>
        `;
      }).join('');
    }

    function syncSelectedStyles() {
      document.querySelectorAll('.check-item').forEach((label) => {
        const input = label.querySelector('input');
        label.classList.toggle('selected', input.checked);
      });
    }

    function getSelectedItems() {
      return Array.from(document.querySelectorAll('input[name="senseCheck"]:checked'))
        .map((input) => input.value);
    }

    function renderResult(selectedItems) {
      const selectedCount = selectedItems.length;

      selectedAnswerList.innerHTML = selectedItems
        .map((item) => `<li>${item}</li>`)
        .join('');

      emptySelectedText.style.display = selectedCount === 0 ? 'block' : 'none';
      countText.textContent = `チェック数：${selectedCount}個`;

      if (selectedCount >= 5) {
        resultTitle.textContent = 'チェック結果';
        resultDescription.textContent = resultTextForFiveOrMore;
      } else {
        resultTitle.textContent = 'チェック結果は準備中です。';
        resultDescription.textContent = pendingText;
      }

      const selectedText = selectedItems.length > 0
        ? selectedItems.map((item) => `・${item}`).join('\n')
        : 'チェックされた項目はありません。';

      latestMessage = `≪住まいの感覚チェック≫

【あなたの回答】
${selectedText}

【チェック結果】
${resultTitle.textContent}

${resultDescription.textContent}`;
    }

    function startCheck() {
      const selectedItems = getSelectedItems();

      showScreen(loadingScreen);

      window.setTimeout(() => {
        renderResult(selectedItems);
        showScreen(resultScreen);
      }, 900);
    }

    async function initLiff() {
      if (typeof liff === 'undefined') return;

      try {
        await liff.init({ liffId: LIFF_ID });
        liffReady = true;
      } catch (error) {
        console.error('LIFF初期化失敗', error);
      }
    }

    async function sendToLine() {
      if (!latestMessage) {
        alert('先に感覚チェックをしてください。');
        return;
      }

      if (!liffReady) {
        alert('LIFFの初期化が完了していません。');
        return;
      }

      try {
        if (!liff.isLoggedIn()) {
          liff.login();
          return;
        }

        if (!liff.isInClient()) {
          alert('LINEアプリ内で開くと送信できます。');
          return;
        }

        await liff.sendMessages([{ type: 'text', text: latestMessage }]);
        alert('LINEに送信しました');
        liff.closeWindow();
      } catch (error) {
        console.error('送信失敗', error);
        alert('LINE送信に失敗しました。LIFF設定をご確認ください。');
      }
    }

    renderCheckItems();

    document.addEventListener('change', (event) => {
      if (event.target.matches('input[name="senseCheck"]')) {
        syncSelectedStyles();
      }
    });

    checkButton.addEventListener('click', startCheck);
    sendButton.addEventListener('click', sendToLine);
    initLiff();
  </script>
</body>
</html>
